<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HW-7</title>
</head>
<body>

    <!-- Задание 1 -->
    <div>
        <h1 class="task1-title">Заголовок</h1>
        <button class="task1-btn">Скрыть / Показать</button>
    </div>

    <!-- Задание 2 -->
    <div>
        <p class="task2-text">Текст</p>
        <button class="task2-btn">Изменить цвет</button>
    </div>

    <!-- Задание 3 -->
    <div>
        <h1 class="task3-title">Старый текст</h1>
        <button class="task3-btn">Изменить текст</button>
    </div>

    <!-- Задание 4 -->
    <div>
        <p class="task4-description">Текст 1</p>
        <p class="task4-description">Текст 2</p>
        <p class="task4-description">Текст 3</p>
    </div>

    <!-- Задание 5 -->
    <div>
        <p class="task5-description">Первый</p>
        <p>Второй</p>
        <p class="task5-description">Третий</p>
    </div>

    <!-- Задание 6 -->
    <div>
        <button class="task6-btn">Добавить элемент</button>
    </div>

    <!-- Задание 7 -->
    <div>
        <p class="task7-description">Первый</p>
        <p class="task7-description">Второй</p>
        <button class="task7-btn">Удалить элемент</button>
    </div>

    <script>
        // Задание 1

        const task1Title = document.querySelector(".task1-title");
        const task1Btn = document.querySelector(".task1-btn");

        task1Btn.addEventListener("click", () => {
            if (task1Title.style.display === "none") {
                task1Title.style.display = "block";
            } else {
                task1Title.style.display = "none";
            }
        });


        // Задание 2

        const task2Text = document.querySelector(".task2-text");
        const task2Btn = document.querySelector(".task2-btn");

        task2Btn.addEventListener("click", () => {
            task2Text.style.color = "blue";
        });


        // Задание 3

        const task3Title = document.querySelector(".task3-title");
        const task3Btn = document.querySelector(".task3-btn");

        task3Btn.addEventListener("click", () => {
            task3Title.textContent = "Привет, мир!";
        });


        // Задание 4

        const task4Descriptions =
            document.querySelectorAll(".task4-description");

        task4Descriptions.forEach((item) => {
            item.textContent = "Измененный текст";
        });


        // Задание 5

        const task5Descriptions =
            document.querySelectorAll(".task5-description");

        task5Descriptions.forEach((item) => {
            item.textContent = "Новый текст";
        });


        // Задание 6

        const task6Btn = document.querySelector(".task6-btn");

        task6Btn.addEventListener("click", () => {
            const newParagraph = document.createElement("p");

            newParagraph.textContent = "Новый абзац";

            document.body.appendChild(newParagraph);
        });


        // Задание 7

        const task7Btn = document.querySelector(".task7-btn");

        task7Btn.addEventListener("click", () => {
            const firstDescription =
                document.querySelector(".task7-description");

            if (firstDescription) {
                firstDescription.remove();
            }
        });
    </script>

</body>
</html>
